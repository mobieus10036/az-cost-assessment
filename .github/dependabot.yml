version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '05:00'
      timezone: 'UTC'
    open-pull-requests-limit: 10
    versioning-strategy: auto
    labels:
      - dependencies
      - security

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '05:30'
      timezone: 'UTC'
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - ci
