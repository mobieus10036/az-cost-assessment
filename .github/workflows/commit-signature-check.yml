name: Commit Signature Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  verify-signatures:
    name: Verify commit signatures
    runs-on: ubuntu-latest
    steps:
      - name: Verify all PR commits are signed and verified
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number,
              per_page: 100
            });

            const unsigned = commits.filter(c => !c.commit.verification || !c.commit.verification.verified);
            if (unsigned.length > 0) {
              core.setFailed(`Unsigned or unverified commits found: ${unsigned.map(c => c.sha.substring(0, 7)).join(', ')}`);
              return;
            }

            core.info(`All ${commits.length} commits are signed and verified.`);
