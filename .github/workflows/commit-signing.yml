name: Commit Signing

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: commit-signing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-signed-commits:
    name: Verify all commits are signed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check commit signatures
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Checking commits from $BASE_SHA to $HEAD_SHA"

          UNSIGNED=""
          while IFS= read -r commit; do
            SIG=$(git log -1 --format="%G?" "$commit")
            case "$SIG" in
              G|U|X|Y|E)
                echo "✅ $commit — signed (status: $SIG)"
                ;;
              N|B|"")
                echo "❌ $commit — unsigned or bad signature (status: $SIG)"
                UNSIGNED="$UNSIGNED $commit"
                ;;
            esac
          done < <(git rev-list "$BASE_SHA".."$HEAD_SHA")

          if [ -n "$UNSIGNED" ]; then
            echo ""
            echo "The following commits are not signed:"
            for c in $UNSIGNED; do
              git log -1 --oneline "$c"
            done
            echo ""
            echo "All commits to main must be GPG-signed."
            echo "See: https://docs.github.com/en/authentication/managing-commit-signature-verification"
            exit 1
          fi

          echo ""
          echo "All commits are signed."
